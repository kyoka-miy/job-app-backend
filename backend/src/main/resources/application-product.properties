server.error.include-message=always
server.error.include-binding-errors=always

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.mvc.cors.allowed-origins=https://main--verdant-crumble-fcf173.netlify.app
backend.base-url=https://job-app-backend-production.up.railway.app

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAILUSER}
spring.mail.password=${MAILPASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true